name: Release oxlint-config

on:
  push:
    tags:
      - "oxlint-config@v*"
  workflow_dispatch:

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release-package
        with:
          package: "@kazukit/oxlint-config"
          npm-token: ${{ secrets.NPM_TOKEN }}
